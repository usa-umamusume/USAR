<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>対戦ランキングサイト（仮）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    main {
      padding: 15px;
      max-width: 800px;
      margin: auto;
    }

    section {
      background: white;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
      border-left: 5px solid #3498db;
      padding-left: 8px;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 5px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      text-align: center;
      flex: 1;
      min-width: 120px;
    }

    .btn:hover {
      background: #2980b9;
    }

    .schedule-item {
      margin-bottom: 8px;
    }

    .schedule-item a {
      color: #3498db;
      text-decoration: none;
    }

    .schedule-item a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      font-size: 12px;
      padding: 10px;
      color: #888;
    }
  </style>
</head>

<body>

  対戦ランキングサイト（β版）

    </ul>
  </section>

  <!-- リンク -->
  <section>
    <h2>📊 ランキング詳細</h2>
    <div class="button-group">

  <section>

    <div class="schedule-item">
      5/10（土）

  © 2026 対戦コミュニティ
