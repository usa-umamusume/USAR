<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>（仮）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    main {
      padding: 15px;
      max-width: 800px;
      margin: auto;
    }

    section {
      background: white;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
      border-left: 5px solid #3498db;
      padding-left: 8px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      text-align: center;
      flex: 1;
      min-width: 120px;
    }

    .btn:hover {
      background: #2980b9;
    }

    footer {
      text-align: center;
      font-size: 12px;
      padding: 10px;
      color: #888;
    }

    /* 初期はテーブル非表示（ローディング中のチラ見え防止） */
    .ranking-table {
      display: none;
    }

    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
    }
    
    .ranking-table th,
    .ranking-table td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    
    .ranking-table th {
      background-color: #f0f0f0;
    }
    
    .rank-1 { background-color: #fff4cc; font-weight: bold; }
    .rank-2 { background-color: #f0f0f0; }
    .rank-3 { background-color: #f9e0c7; }

    /* ローディング */
    #loading {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #666;
    }

    .spinner {
      margin: 10px auto;
      width: 24px;
      height: 24px;
      border: 3px solid #ddd;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .ranking-table th,
      .ranking-table td {
        padding: 6px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<header>
  （β版）
</header>

<main>

  <section>
    <h2>🏆 今シーズン TOP3</h2>

    <!-- ローディング表示 -->
    <div id="loading">
      読み込み中...
      <div class="spinner"></div>
    </div>

    <table class="ranking-table">
      <thead>
        <tr>
          <th>順位</th>
          <th>トレーナー名</th>
          <th>Pt</th>
        </tr>
      </thead>
      <tbody id="ranking-body"></tbody>
    </table>
    <div class="button-group">
      <a href="ranking_all.html" class="btn">トータルランキング</a>
    </div>
  </section>

  <section>
    <h2>📊 ウマ娘別 詳細ランキング</h2>
    <div class="button-group">
      <a href="ranking_character.html" class="btn">全ウマ娘名別</a>
      <a href="ranking_unit.html" class="btn">育成ウマ娘名別</a>
    </div>
  </section>

  <section>
    <h2>📅 大会スケジュール</h2>
    <div>5/10（土） <a href="#">春大会（リンク）</a></div>
    <div>5/20（火） <a href="#">交流戦（リンク）</a></div>
  </section>

</main>

<footer>
  © 2026 対戦コミュニティ
</footer>

<script>
let data = [];

async function loadData() {
  const loading = document.getElementById("loading");

  loading.style.display = "block";

  const response = await fetch("https://script.google.com/macros/s/AKfycbwHu-R247oSbm0S4072FDy6lC5wbqH5V0mlHXlTaxdg8U-9f6RAmqS3hBj5MAEz2xmyTg/exec");
  data = await response.json();

  renderTop3();

  document.querySelector(".ranking-table").style.display = "table";

  loading.style.display = "none";
}

function renderTop3() {
  const tbody = document.getElementById("ranking-body");
  tbody.innerHTML = "";

  data.slice(0, 3).forEach(item => {
    let rankClass = "";
    if (item.rank === 1) rankClass = "rank-1";
    if (item.rank === 2) rankClass = "rank-2";
    if (item.rank === 3) rankClass = "rank-3";

    tbody.innerHTML += `
      <tr class="${rankClass}">
        <td>${item.rank}</td>
        <td>${item.name}</td>
        <td>${item.pt}</td>
      </tr>
    `;
  });
}

loadData();
</script>

</body>
</html>
